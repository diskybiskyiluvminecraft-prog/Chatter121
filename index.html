<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chatter121</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen">
<h1>💬 Chatter121</h1>

<input id="usernameInput" placeholder="Username">
<input id="roomInput" placeholder="Room Code">

<div class="loginButtons">
<button onclick="joinChat()">Join Room</button>
<button onclick="createRoom()">Create Room</button>
</div>
</div>

<div id="chatScreen">
<div class="topBar">
<div>
<div id="roomLabel">Room</div>
<div id="status">🔴 Offline</div>
<div id="typing"></div>
</div>

<div>
<button onclick="copyRoom()">📋</button>
<button onclick="startCall()">📞</button>
<button onclick="hangUp()">📴</button>
</div>
</div>

<div id="messages"></div>

<div class="bottomBar">
<input id="message" placeholder="Type a message...">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
